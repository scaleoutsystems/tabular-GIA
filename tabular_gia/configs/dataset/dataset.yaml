# dataloader gpu speedups
num_workers: 0
pin_memory: true
persistent_workers: false

# dataloader specifics
batch_size: 256
train_frac: 0.70
val_frac: 0.15
test_frac: 0.15

# client partitioning
partition_strategy: iid # iid | dirichlet
dirichlet_alpha: 0.3
min_client_samples: 1
dirichlet_max_attempts: 50
